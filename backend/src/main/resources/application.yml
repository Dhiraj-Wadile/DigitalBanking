server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html
    min-response-size: 1024

spring:
  profiles:
    active: local
  application:
    name: digital-banking-api

  datasource:
    url: jdbc:postgresql://localhost:5432/digital_banking
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: myUltraSecureJwtKey_1234567890!@#$%^&*()_+abc123
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
  issuer: DigitalBankingApp
  audience: DigitalBankingUsers

app:
  base-url: http://localhost:8080
  frontend-url: http://localhost:4200
  support-email: support@digitalbanking.com
  company-name: Digital Banking Platform

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.digitalbanking: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
