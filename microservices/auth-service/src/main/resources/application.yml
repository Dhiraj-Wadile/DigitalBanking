server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/digital_banking_auth
    username: postgres
    password: postgres
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

jwt:
  secret: auth-service-ultra-secure-jwt-key-32chars-min
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
  issuer: DigitalBanking-Auth
  audience: DigitalBankingUsers

logging:
  level:
    com.auth: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
