<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DigitalBank - Smart Banking</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Digital Banking Platform - Manage your finances with ease">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f8fafc}
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e40af 50%,#3b82f6 100%);color:#fff;font-family:'Inter',sans-serif}
    .loader-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <app-root>
    <div class="loader">
      <div class="loader-spinner"></div>
      <span style="font-size:0.95rem;opacity:0.8">Loading DigitalBank...</span>
    </div>
  </app-root>
</body>
</html>
